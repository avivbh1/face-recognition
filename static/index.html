<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Face Verification</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0c0c12;
      --surface: #13131d;
      --border:  #21213a;
      --accent:  #6c63ff;
      --green:   #2ecc71;
      --red:     #e74c3c;
      --yellow:  #f1c40f;
      --muted:   #55556a;
      --text:    #ddddf0;
      --r:       12px;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 48px; gap: 22px;
    }

    h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); }
    .sub { font-size: .72rem; color: var(--muted); margin-top: 3px; text-align: center; }

    /* ── camera grid ── */
    #cam-grid {
      display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;
      width: 100%; max-width: 1200px;
    }

    .cam-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden;
      display: flex; flex-direction: column;
      width: 480px; max-width: 100%;
    }

    .cam-header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }
    .cam-label-text {
      flex: 1; font-size: .88rem; font-weight: 600; cursor: pointer;
    }
    .cam-label-input {
      flex: 1; background: #0f0f1a; border: 1px solid var(--accent);
      color: var(--text); border-radius: 5px; padding: 3px 7px;
      font-size: .85rem; outline: none;
    }
    .btn-icon {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: .95rem; padding: 3px 6px; border-radius: 5px; line-height: 1;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--text); background: #1e1e2e; }

    .cam-feed img { display: block; width: 100%; }

    .cam-footer {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
    }
    .cam-badge {
      font-size: .8rem; font-weight: 700; letter-spacing: .05em;
      padding: 5px 12px; border-radius: 6px;
      background: #1a1a28; color: var(--muted);
      transition: background .2s, color .2s; white-space: nowrap;
    }
    .cam-badge.match    { background: #0d3320; color: var(--green); }
    .cam-badge.nomatch  { background: #2d0d0d; color: var(--red);   }
    .cam-badge.noface   { background: #1a1a28; color: var(--muted); }
    .cam-badge.enrolling{ background: #1a1910; color: var(--yellow);}

    .score-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .score-val  { font-size: .78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    .bar-track  { height: 5px; background: #1e1e30; border-radius: 3px; overflow: hidden; }
    .bar-fill   { height: 100%; border-radius: 3px; width: 0; transition: width .2s, background .2s; }

    /* enroll progress bar (hidden by default) */
    .enroll-prog { display: none; flex: 1; flex-direction: column; gap: 4px; }
    .enroll-prog.visible { display: flex; }
    .enroll-prog-label { font-size: .72rem; color: var(--yellow); }
    .ep-track { height: 5px; background: #1e1e30; border-radius: 3px; overflow: hidden; }
    .ep-fill  { height: 100%; background: var(--yellow); border-radius: 3px; transition: width .3s; }

    /* pip button */
    .btn-icon.pip-active {
      color: var(--accent);
      background: rgba(108,99,255,.18);
    }

    /* cam sound upload */
    .cam-sound-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 4px 8px;
      font-size: .75rem; cursor: pointer; white-space: nowrap;
      transition: border .15s, color .15s;
    }
    .cam-sound-btn:hover { border-color: var(--accent); color: var(--text); }
    .cam-sound-btn.has-sound { border-color: var(--accent); color: var(--accent); }

    /* ── bottom row ── */
    .bottom-row {
      display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
      width: 100%; max-width: 1200px;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px;
      flex: 1; min-width: 260px;
    }
    .card-title {
      font-size: .65rem; letter-spacing: .14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    /* enrolled faces */
    #faces-list { display: flex; flex-direction: column; gap: 7px; }
    .face-item { display: flex; flex-direction: column; background: #0f0f1a; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .face-item-row {
      display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    }
    .face-item img {
      width: 38px; height: 38px; border-radius: 50%;
      object-fit: cover; border: 1px solid var(--border); flex-shrink: 0;
    }
    .face-item .fname { flex: 1; font-size: .85rem; font-weight: 600; }
    .face-item .fsound-toggle {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: .85rem; padding: 2px 6px; border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .face-item .fsound-toggle:hover, .face-item .fsound-toggle.active
      { color: var(--accent); background: rgba(108,99,255,.12); }
    .face-item .fdel {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .9rem; padding: 2px 6px;
      border-radius: 4px; transition: color .15s, background .15s;
    }
    .face-item .fdel:hover { color: var(--red); background: #2d0d0d; }
    .face-sound-panel {
      display: none; flex-direction: column; gap: 6px;
      padding: 8px 12px 10px; border-top: 1px solid var(--border);
      background: #0a0a14;
    }
    .face-sound-panel.open { display: flex; }
    .sound-row {
      display: flex; align-items: center; gap: 8px; font-size: .78rem;
    }
    .sound-row-label { color: var(--muted); flex: 1; }
    .sound-upload-btn {
      background: none; border: 1px dashed var(--border); color: var(--muted);
      border-radius: 5px; padding: 2px 8px; font-size: .72rem; cursor: pointer;
      transition: border .15s, color .15s; white-space: nowrap;
    }
    .sound-upload-btn:hover       { border-color: var(--accent); color: var(--text); }
    .sound-upload-btn.has-sound   { border-color: var(--accent); color: var(--accent); border-style: solid; }

    .announce-row { flex-direction: column; align-items: stretch; gap: 5px; }
    .announce-input-wrap { display: flex; gap: 6px; }
    .announce-input {
      flex: 1; background: #0f0f1a; border: 1px solid var(--border);
      color: var(--text); border-radius: 5px; padding: 3px 7px;
      font-size: .78rem; outline: none; transition: border .15s;
    }
    .announce-input:focus { border-color: var(--accent); }
    .announce-save {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 5px; padding: 2px 9px; font-size: .72rem; cursor: pointer;
      white-space: nowrap; transition: border .15s, color .15s;
    }
    .announce-save:hover  { border-color: var(--accent); color: var(--text); }
    .announce-save.saved  { border-color: var(--green); color: var(--green); }

    /* ── detection queue ── */
    .queue-section { width: 100%; max-width: 1200px; }
    .queue-scroll {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
    }
    .queue-scroll::-webkit-scrollbar { height: 5px; }
    .queue-scroll::-webkit-scrollbar-track { background: transparent; }
    .queue-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .q-card {
      flex-shrink: 0; width: 150px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; display: flex; flex-direction: column;
    }
    .q-card.recognition { border-color: rgba(46,204,113,.3); width: 200px; }
    .q-card img.q-crop {
      width: 100%; height: 100px; object-fit: cover; display: block;
    }
    .q-card.recognition img.q-crop { height: 80px; }
    .q-card .q-enrolled-photo {
      width: 36px; height: 36px; border-radius: 50%; object-fit: cover;
      border: 2px solid var(--green); flex-shrink: 0;
    }
    .q-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .q-name { font-size: .82rem; font-weight: 700; }
    .q-name.match { color: var(--green); }
    .q-name.unknown { color: var(--muted); }
    .q-meta { font-size: .68rem; color: var(--muted); }
    .q-score { font-size: .68rem; color: var(--accent); }
    .q-rec-row { display: flex; align-items: center; gap: 7px; }

    .q-enroll-area { margin-top: auto; }
    .q-enroll-btn {
      width: 100%; padding: 5px; border: none; border-radius: 0 0 0 0;
      background: rgba(108,99,255,.15); color: var(--accent);
      font-size: .75rem; font-weight: 600; cursor: pointer;
      transition: background .15s; border-top: 1px solid var(--border);
    }
    .q-enroll-btn:hover { background: rgba(108,99,255,.3); }
    .q-enroll-form { display: flex; border-top: 1px solid var(--border); }
    .q-enroll-form input {
      flex: 1; background: #0f0f1a; border: none; outline: none;
      color: var(--text); font-size: .75rem; padding: 5px 7px;
      border-radius: 0;
    }
    .q-enroll-form button {
      background: var(--accent); border: none; color: #fff;
      font-size: .72rem; padding: 5px 8px; cursor: pointer;
    }
    .q-empty { font-size: .8rem; color: var(--muted); padding: 8px 0; }

    /* enroll form */
    .enroll-form { display: flex; flex-direction: column; gap: 8px; }
    .enroll-form input[type=text] {
      padding: 8px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: #0f0f1a;
      color: var(--text); font-size: .85rem; outline: none;
      transition: border .15s;
    }
    .enroll-form input[type=text]:focus { border-color: var(--accent); }
    select.cam-select {
      padding: 7px 10px; border-radius: 7px;
      border: 1px solid var(--border); background: #0f0f1a;
      color: var(--text); font-size: .85rem; outline: none; cursor: pointer;
    }
    .file-label {
      display: flex; align-items: center; gap: 8px; padding: 7px 10px;
      border-radius: 7px; border: 1px dashed var(--border); cursor: pointer;
      font-size: .8rem; color: var(--muted); transition: border .15s, color .15s;
    }
    .file-label:hover { border-color: var(--accent); color: var(--text); }
    .file-label input { display: none; }
    #sound-name { font-size: .72rem; color: var(--accent); }

    /* enroll tabs */
    .enroll-tabs { display: flex; gap: 6px; }
    .etab {
      flex: 1; padding: 7px; border-radius: 7px; font-size: .8rem; font-weight: 600;
      border: 1px solid var(--border); background: #0f0f1a; color: var(--muted);
      cursor: pointer; transition: border .15s, color .15s, background .15s;
    }
    .etab.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.1); }

    /* sound settings */
    .radio-opts { display: flex; flex-direction: column; gap: 8px; }
    .radio-opt  {
      display: flex; align-items: center; gap: 9px;
      font-size: .85rem; cursor: pointer; padding: 7px 10px;
      border-radius: 7px; border: 1px solid var(--border);
      background: #0f0f1a; transition: border .15s;
    }
    .radio-opt:has(input:checked) { border-color: var(--accent); }
    .radio-opt input[type=radio]  { accent-color: var(--accent); }
    .upload-inline {
      margin-left: auto; font-size: .75rem; color: var(--muted);
      border: 1px dashed var(--border); border-radius: 5px;
      padding: 2px 8px; cursor: pointer; transition: border .15s, color .15s;
    }
    .upload-inline:hover         { border-color: var(--accent); color: var(--text); }
    .upload-inline.has-file      { border-color: var(--accent); color: var(--accent); }
    .upload-inline input         { display: none; }

    .btn-primary {
      padding: 9px; border: none; border-radius: 8px;
      background: var(--accent); color: #fff;
      font-size: .88rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:hover    { opacity: .85; }
    .btn-primary:disabled { opacity: .4; cursor: default; }

    /* ── alert overlay ── */
    #alert-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    #alert-overlay.visible { opacity: 1; pointer-events: auto; }

    .alert-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 30px 38px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      box-shadow: 0 0 80px rgba(46,204,113,.12);
      max-width: 320px; width: 90%; position: relative;
    }
    .alert-photo {
      width: 110px; height: 110px; border-radius: 50%;
      object-fit: cover; border: 4px solid var(--green);
      box-shadow: 0 0 28px rgba(46,204,113,.45);
    }
    .alert-name { font-size: 1.55rem; font-weight: 700; color: var(--green); }
    .alert-cam  { font-size: .78rem; color: var(--muted); }
    .alert-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer;
    }
    .alert-timer { width: 100%; height: 3px; background: #1e1e30; border-radius: 2px; overflow: hidden; }
    .alert-timer-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width linear; }
  </style>
</head>
<body>

<header>
  <h1>Face Verification</h1>
  <p class="sub">Multi-camera real-time recognition</p>
</header>

<!-- camera grid (built dynamically) -->
<div id="cam-grid"></div>

<!-- detection / recognition queue -->
<div class="queue-section">
  <div class="card-title" style="margin-bottom:10px">Recent Detections &amp; Recognitions <span id="queue-count" style="color:var(--muted)"></span></div>
  <div class="queue-scroll" id="queue-scroll">
    <div class="q-empty">No events yet.</div>
  </div>
</div>

<!-- bottom: faces + enroll -->
<div class="bottom-row">
  <div class="card" style="max-width:420px">
    <div class="card-title">Enrolled Faces</div>
    <div id="faces-list"><div style="font-size:.8rem;color:var(--muted)">No faces enrolled yet.</div></div>
  </div>

  <div class="card" style="max-width:280px">
    <div class="card-title">General Sound</div>
    <div class="radio-opts">
      <label class="radio-opt">
        <input type="radio" name="gsound" value="notification" />
        🔔 Notification <small style="color:var(--muted);margin-left:4px">default</small>
      </label>
      <label class="radio-opt">
        <input type="radio" name="gsound" value="voice" />
        🗣️ Voice announcement
      </label>
      <label class="radio-opt">
        <input type="radio" name="gsound" value="custom" />
        📁 Custom file
        <label class="upload-inline" id="gsound-upload-lbl" title="Upload sound">
          Upload
          <input type="file" id="gsound-file" accept="audio/*" />
        </label>
      </label>
    </div>
    <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:6px;">💬 Unknown person announcement</div>
      <div class="announce-input-wrap">
        <input type="text" id="unknown-announce-input" class="announce-input"
               placeholder="e.g. Unknown person detected!" maxlength="200" />
        <button id="unknown-announce-save" class="announce-save">Save</button>
      </div>
    </div>
  </div>

  <div class="card" style="max-width:340px">
    <div class="card-title">Add Person</div>
    <div class="enroll-form">

      <!-- name (shared) -->
      <input type="text" id="enroll-name" placeholder="Name" maxlength="40" />

      <!-- mode tabs -->
      <div class="enroll-tabs">
        <button class="etab active" id="tab-cam"   data-tab="cam">📷 Camera</button>
        <button class="etab"        id="tab-image" data-tab="image">🖼️ Upload Image</button>
      </div>

      <!-- camera mode -->
      <div id="mode-cam">
        <select class="cam-select" id="enroll-cam"></select>
      </div>

      <!-- image upload mode -->
      <div id="mode-image" style="display:none; flex-direction:column; gap:8px;">
        <label class="file-label" id="img-upload-lbl">
          📂 Choose image…
          <input type="file" id="enroll-image" accept="image/*" />
        </label>
        <div id="img-preview-wrap" style="display:none; text-align:center;">
          <img id="img-preview" src="" alt="preview"
               style="max-height:120px; border-radius:8px; border:1px solid var(--border);" />
          <div id="img-preview-name" style="font-size:.72rem; color:var(--muted); margin-top:4px;"></div>
        </div>
      </div>

      <!-- sound (shared) -->
      <label class="file-label">
        🔊 Alert sound (optional)
        <input type="file" id="enroll-sound" accept="audio/*" />
      </label>
      <div id="sound-name"></div>

      <button class="btn-primary" id="enroll-btn">Enroll Face</button>
    </div>
  </div>
</div>

<!-- recognition alert -->
<div id="alert-overlay">
  <div class="alert-card">
    <button class="alert-close" id="alert-close">✕</button>
    <img class="alert-photo" id="alert-photo" src="" alt="" />
    <div class="alert-name"  id="alert-name"></div>
    <div class="alert-cam"   id="alert-cam"></div>
    <div class="alert-timer"><div class="alert-timer-fill" id="alert-fill"></div></div>
  </div>
</div>

<script>
// ── helpers ────────────────────────────────────────────────────────────────────
function escAttr(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── state ──────────────────────────────────────────────────────────────────────
const ALERT_DURATION = 6000;
const ALERT_COOLDOWN = 12000;
const lastAlerted    = {};   // "name@cam" → timestamp
let alertTimer  = null;
let currentAudio = null;
let cameras = [];  // [{id, label, has_sound}]

// ── picture-in-picture ─────────────────────────────────────────────────────────
const pipVideos = {};   // cam_id → <video>

function setupPiP(camId) {
  if (!document.pictureInPictureEnabled) return;

  const btn   = document.getElementById(`pip-${camId}`);
  const imgEl = document.querySelector(`#cam-card-${camId} .cam-feed img`);
  btn.style.display = '';

  const canvas = document.createElement('canvas');
  const video  = document.createElement('video');
  video.muted = true;
  video.style.display = 'none';
  document.body.appendChild(video);
  pipVideos[camId] = video;

  // mirror MJPEG img → canvas on every animation frame
  ;(function draw() {
    if (imgEl.naturalWidth > 0) {
      if (canvas.width !== imgEl.naturalWidth) {
        canvas.width  = imgEl.naturalWidth;
        canvas.height = imgEl.naturalHeight;
      }
      canvas.getContext('2d').drawImage(imgEl, 0, 0);
    }
    requestAnimationFrame(draw);
  })();

  video.srcObject = canvas.captureStream(25);
  video.play().catch(() => {});

  video.addEventListener('enterpictureinpicture', () => {
    btn.classList.add('pip-active'); btn.title = 'Close popup';
  });
  video.addEventListener('leavepictureinpicture', () => {
    btn.classList.remove('pip-active'); btn.title = 'Pop out camera';
  });

  btn.addEventListener('click', async () => {
    try {
      if (document.pictureInPictureElement === video) {
        await document.exitPictureInPicture();
      } else {
        if (document.pictureInPictureElement) await document.exitPictureInPicture();
        await video.requestPictureInPicture();
      }
    } catch (e) { console.warn('PiP:', e); }
  });
}

// ── sound settings ─────────────────────────────────────────────────────────────
let soundSettings = { general_sound_type: 'notification', has_custom_sound: false };

async function loadSoundSettings() {
  const res = await fetch('/settings');
  soundSettings = await res.json();
  // reflect in radio buttons
  const radio = document.querySelector(`input[name=gsound][value="${soundSettings.general_sound_type}"]`);
  if (radio) radio.checked = true;
  const unknownInput = document.getElementById('unknown-announce-input');
  if (unknownInput && soundSettings.unknown_announcement_text)
    unknownInput.value = soundSettings.unknown_announcement_text;
  if (soundSettings.has_custom_sound)
    document.getElementById('gsound-upload-lbl').classList.add('has-file');
}

async function saveSoundType(type) {
  soundSettings.general_sound_type = type;
  await fetch('/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                              body: JSON.stringify({ general_sound_type: type }) });
}

document.querySelectorAll('input[name=gsound]').forEach(r =>
  r.addEventListener('change', () => saveSoundType(r.value))
);

async function saveUnknownAnnouncement() {
  const text = document.getElementById('unknown-announce-input').value.trim();
  soundSettings.unknown_announcement_text = text;
  await fetch('/settings', { method: 'POST', headers: {'Content-Type': 'application/json'},
                              body: JSON.stringify({ unknown_announcement_text: text }) });
  const btn = document.getElementById('unknown-announce-save');
  btn.textContent = 'Saved!'; btn.classList.add('saved');
  setTimeout(() => { btn.textContent = 'Save'; btn.classList.remove('saved'); }, 1500);
}

document.getElementById('unknown-announce-save').addEventListener('click', saveUnknownAnnouncement);
document.getElementById('unknown-announce-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveUnknownAnnouncement();
});

document.getElementById('gsound-file').addEventListener('change', async function() {
  if (!this.files[0]) return;
  const fd = new FormData(); fd.append('sound', this.files[0]);
  await fetch('/settings/general-sound', { method: 'POST', body: fd });
  soundSettings.has_custom_sound = true;
  document.getElementById('gsound-upload-lbl').classList.add('has-file');
  // auto-select custom if not already
  const radio = document.querySelector('input[name=gsound][value="custom"]');
  if (radio && !radio.checked) { radio.checked = true; saveSoundType('custom'); }
});

// ── audio helpers ──────────────────────────────────────────────────────────────
let currentCtx = null;  // Web Audio context (chime)

function stopAllSounds() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (currentCtx)   { try { currentCtx.close(); } catch (_) {} currentCtx = null; }
  if (window.speechSynthesis) speechSynthesis.cancel();
}

function playNotificationChime() {
  currentCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = currentCtx;
  [[0, 523], [0.13, 659], [0.26, 784]].forEach(([t, freq]) => {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime + t);
    gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.55);
    osc.start(ctx.currentTime + t); osc.stop(ctx.currentTime + t + 0.55);
  });
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0; utt.pitch = 1.0; utt.volume = 1.0;
  speechSynthesis.speak(utt);
}

function playGeneralSound(label, isUnknown, camLabel) {
  const type = soundSettings.general_sound_type;
  if (type === 'voice') {
    speak(isUnknown ? `Unknown person detected at ${camLabel}` : label);
  } else if (type === 'custom' && soundSettings.has_custom_sound) {
    currentAudio = new Audio(`/general_sound?t=${Date.now()}`);
    currentAudio.play().catch(() => {});
  } else {
    playNotificationChime();
  }
}

// ── alert ──────────────────────────────────────────────────────────────────────
const lastUnknown = {};

function announceUnknown(camId, camLabel) {
  const now = Date.now();
  if (lastUnknown[camId] && now - lastUnknown[camId] < ALERT_COOLDOWN) return;
  lastUnknown[camId] = now;
  stopAllSounds();
  const customText = soundSettings.unknown_announcement_text;
  if (customText) {
    speak(customText);
  } else {
    playGeneralSound(null, true, camLabel);
  }
}

function showAlert(name, camLabel, soundUrl, announcementText) {
  const key = `${name}@${camLabel}`;
  const now  = Date.now();
  if (lastAlerted[key] && now - lastAlerted[key] < ALERT_COOLDOWN) return;
  lastAlerted[key] = now;

  document.getElementById('alert-photo').src = `/faces/${encodeURIComponent(name)}/photo?t=${now}`;
  document.getElementById('alert-name').textContent = name;
  document.getElementById('alert-cam').textContent  = `Detected at: ${camLabel}`;
  document.getElementById('alert-overlay').classList.add('visible');

  stopAllSounds();
  if (announcementText) {
    speak(announcementText);
  } else if (soundUrl) {
    currentAudio = new Audio(soundUrl);
    currentAudio.play().catch(() => {});
  } else {
    playGeneralSound(name, false, camLabel);
  }

  const fill = document.getElementById('alert-fill');
  fill.style.transition = 'none'; fill.style.width = '100%';
  requestAnimationFrame(() => {
    fill.style.transition = `width ${ALERT_DURATION}ms linear`;
    fill.style.width = '0%';
  });

  clearTimeout(alertTimer);
  alertTimer = setTimeout(dismissAlert, ALERT_DURATION);
}

function dismissAlert() {
  document.getElementById('alert-overlay').classList.remove('visible');
  clearTimeout(alertTimer);
  stopAllSounds();
}

document.getElementById('alert-close').addEventListener('click', dismissAlert);
document.getElementById('alert-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('alert-overlay')) dismissAlert();
});

// ── camera grid builder ────────────────────────────────────────────────────────
function buildCameraCards(cams) {
  const grid = document.getElementById('cam-grid');
  const sel  = document.getElementById('enroll-cam');
  grid.innerHTML = '';
  sel.innerHTML  = '';

  cams.forEach(cam => {
    // card
    const card = document.createElement('div');
    card.className = 'cam-card';
    card.id = `cam-card-${cam.id}`;
    card.innerHTML = `
      <div class="cam-header">
        <span class="cam-label-text" id="lbl-${cam.id}" title="Click to rename">${cam.label}</span>
        <input class="cam-label-input" id="lbl-input-${cam.id}" style="display:none" value="${cam.label}" />
        <button class="btn-icon" id="lbl-edit-${cam.id}" title="Rename">✏️</button>
        <button class="btn-icon" id="pip-${cam.id}" title="Pop out camera" style="display:none">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="13" height="10" rx="1.5"/>
            <rect x="7.5" y="6.5" width="5" height="4" rx="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <label class="cam-sound-btn ${cam.has_sound ? 'has-sound' : ''}" id="csound-lbl-${cam.id}"
               title="${cam.has_sound ? 'Replace sound' : 'Upload alert sound'}">
          🔊
          <input type="file" accept="audio/*" style="display:none" id="csound-${cam.id}" />
        </label>
      </div>
      <div class="cam-feed"><img src="/video_feed/${cam.id}" alt="${cam.label}" /></div>
      <div class="cam-footer">
        <span class="cam-badge noface" id="badge-${cam.id}">—</span>
        <div class="score-wrap" id="score-wrap-${cam.id}">
          <span class="score-val" id="score-${cam.id}">0.000</span>
          <div class="bar-track"><div class="bar-fill" id="bar-${cam.id}"></div></div>
        </div>
        <div class="enroll-prog" id="ep-${cam.id}">
          <span class="enroll-prog-label" id="ep-lbl-${cam.id}">Enrolling…</span>
          <div class="ep-track"><div class="ep-fill" id="ep-bar-${cam.id}"></div></div>
        </div>
      </div>`;
    grid.appendChild(card);

    // rename logic
    const lblEl  = document.getElementById(`lbl-${cam.id}`);
    const inpEl  = document.getElementById(`lbl-input-${cam.id}`);
    const editBtn= document.getElementById(`lbl-edit-${cam.id}`);
    function startEdit() { lblEl.style.display='none'; inpEl.style.display=''; inpEl.focus(); inpEl.select(); }
    async function commitEdit() {
      const val = inpEl.value.trim() || cam.label;
      await fetch(`/cameras/${cam.id}/label`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({label:val})});
      lblEl.textContent = val; cam.label = val;
      lblEl.style.display=''; inpEl.style.display='none';
      // update enroll select
      const opt = document.querySelector(`#enroll-cam option[value="${cam.id}"]`);
      if (opt) opt.textContent = val;
    }
    editBtn.addEventListener('click', startEdit);
    lblEl.addEventListener('dblclick', startEdit);
    inpEl.addEventListener('blur', commitEdit);
    inpEl.addEventListener('keydown', e => { if (e.key==='Enter') commitEdit(); if (e.key==='Escape') { inpEl.style.display='none'; lblEl.style.display=''; } });

    // camera sound upload
    const csound = document.getElementById(`csound-${cam.id}`);
    const csoundLbl = document.getElementById(`csound-lbl-${cam.id}`);
    csound.addEventListener('change', async () => {
      if (!csound.files[0]) return;
      const fd = new FormData(); fd.append('sound', csound.files[0]);
      await fetch(`/cameras/${cam.id}/sound`, {method:'POST', body:fd});
      csoundLbl.classList.add('has-sound');
      csoundLbl.title = 'Replace sound';
    });

    // enroll select option
    const opt = document.createElement('option');
    opt.value = cam.id; opt.textContent = cam.label;
    sel.appendChild(opt);

    // picture-in-picture
    setupPiP(cam.id);
  });
}

// ── status polling ─────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const res  = await fetch('/status');
    const data = await res.json();
    const enr  = data.enroll;

    data.cameras.forEach(cam => {
      const badge   = document.getElementById(`badge-${cam.cam_id}`);
      const scoreEl = document.getElementById(`score-${cam.cam_id}`);
      const barEl   = document.getElementById(`bar-${cam.cam_id}`);
      const swrap   = document.getElementById(`score-wrap-${cam.cam_id}`);
      const epEl    = document.getElementById(`ep-${cam.cam_id}`);
      const epLbl   = document.getElementById(`ep-lbl-${cam.cam_id}`);
      const epBar   = document.getElementById(`ep-bar-${cam.cam_id}`);
      if (!badge) return;

      // enrollment progress for this specific camera
      if (enr.active && enr.cam_id === cam.cam_id) {
        epEl.classList.add('visible'); swrap.style.display = 'none';
        epLbl.textContent = `Enrolling "${enr.name}": ${enr.progress}/5`;
        epBar.style.width = (enr.progress / 5 * 100) + '%';
        badge.className = 'cam-badge enrolling'; badge.textContent = 'Enrolling…';
        return;
      } else {
        epEl.classList.remove('visible'); swrap.style.display = '';
      }

      scoreEl.textContent  = cam.score.toFixed(3);
      barEl.style.width    = Math.min(cam.score / 0.6 * 100, 100) + '%';

      if (!cam.face_detected) {
        badge.className = 'cam-badge noface'; badge.textContent = 'NO FACE';
        barEl.style.background = '#3498db';
      } else if (cam.matched_name) {
        badge.className = 'cam-badge match'; badge.textContent = cam.matched_name.toUpperCase();
        barEl.style.background = '#2ecc71';
        showAlert(cam.matched_name, cam.label, cam.sound_url, cam.announcement_text);
      } else {
        badge.className = 'cam-badge nomatch'; badge.textContent = 'UNKNOWN';
        barEl.style.background = '#e74c3c';
        announceUnknown(cam.cam_id, cam.label);
      }
    });
  } catch { /* server not ready */ }
}

// ── faces list ─────────────────────────────────────────────────────────────────
async function loadFaces() {
  const res   = await fetch('/faces');
  const faces = await res.json();
  const list  = document.getElementById('faces-list');
  if (!faces.length) {
    list.innerHTML = '<div style="font-size:.8rem;color:var(--muted)">No faces enrolled yet.</div>';
    return;
  }
  list.innerHTML = '';
  faces.forEach(f => {
    const item = document.createElement('div');
    item.className = 'face-item';

    // sound rows for expand panel
    const defaultHas = f.has_default_sound;
    let soundRowsHtml = `
      <div class="sound-row announce-row">
        <span class="sound-row-label">💬 Announcement (spoken on recognition)</span>
        <div class="announce-input-wrap">
          <input type="text" class="announce-input" placeholder="e.g. Welcome, John!"
                 value="${escAttr(f.announcement_text)}" data-face="${escAttr(f.name)}" maxlength="200" />
          <button class="announce-save" data-face="${escAttr(f.name)}">Save</button>
        </div>
      </div>
      <div class="sound-row">
        <span class="sound-row-label">🔊 Default (all cameras)</span>
        <label class="sound-upload-btn ${defaultHas ? 'has-sound' : ''}">
          ${defaultHas ? 'Change' : 'Upload'}
          <input type="file" accept="audio/*" style="display:none"
                 data-face="${f.name}" data-cam="default" />
        </label>
      </div>`;
    cameras.forEach(cam => {
      const has = f.cam_sounds?.[String(cam.id)] || false;
      soundRowsHtml += `
      <div class="sound-row">
        <span class="sound-row-label">📷 ${cam.label}</span>
        <label class="sound-upload-btn ${has ? 'has-sound' : ''}">
          ${has ? 'Change' : 'Override'}
          <input type="file" accept="audio/*" style="display:none"
                 data-face="${f.name}" data-cam="${cam.id}" />
        </label>
      </div>`;
    });

    item.innerHTML = `
      <div class="face-item-row">
        <img src="${f.photo_url}?t=${Date.now()}" alt="${f.name}" />
        <span class="fname">${f.name}</span>
        <button class="fsound-toggle" title="Sound settings">🔊</button>
        <button class="fdel">✕</button>
      </div>
      <div class="face-sound-panel">${soundRowsHtml}</div>`;

    // toggle panel
    const toggle = item.querySelector('.fsound-toggle');
    const panel  = item.querySelector('.face-sound-panel');
    toggle.addEventListener('click', () => {
      panel.classList.toggle('open');
      toggle.classList.toggle('active', panel.classList.contains('open'));
    });

    // announcement text save
    const annInput = item.querySelector('.announce-input');
    const annSave  = item.querySelector('.announce-save');
    async function saveAnnouncement() {
      const face = annInput.dataset.face;
      const text = annInput.value.trim();
      await fetch(`/faces/${encodeURIComponent(face)}/announcement`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text}),
      });
      annSave.textContent = 'Saved!';
      annSave.classList.add('saved');
      setTimeout(() => { annSave.textContent = 'Save'; annSave.classList.remove('saved'); }, 1500);
    }
    annSave.addEventListener('click', saveAnnouncement);
    annInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveAnnouncement(); });

    // sound uploads
    item.querySelectorAll('input[type=file]').forEach(inp => {
      inp.addEventListener('change', async () => {
        if (!inp.files[0]) return;
        const face = inp.dataset.face;
        const cam  = inp.dataset.cam;
        const fd   = new FormData();
        fd.append('sound', inp.files[0]);
        const url = cam === 'default'
          ? `/faces/${encodeURIComponent(face)}/sound`
          : `/faces/${encodeURIComponent(face)}/sound/${cam}`;
        await fetch(url, { method: 'POST', body: fd });
        loadFaces();
      });
    });

    item.querySelector('.fdel').addEventListener('click', async () => {
      if (!confirm(`Remove "${f.name}"?`)) return;
      await fetch(`/faces/${encodeURIComponent(f.name)}`, { method: 'DELETE' });
      loadFaces();
    });

    list.appendChild(item);
  });
}

// ── detection queue ────────────────────────────────────────────────────────────
function timeStr(ts) {
  return new Date(ts * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function renderQueueCard(ev) {
  const card = document.createElement('div');
  card.className = `q-card ${ev.type}`;
  card.dataset.id = ev.id;

  if (ev.type === 'recognition') {
    card.innerHTML = `
      <div class="q-rec-row" style="padding:8px 8px 0;">
        <img class="q-crop" src="${ev.crop_url}?t=1" style="width:80px;height:70px;border-radius:6px;object-fit:cover;flex-shrink:0;" />
        <img class="q-enrolled-photo" src="/faces/${encodeURIComponent(ev.matched_name)}/photo" />
      </div>
      <div class="q-body">
        <div class="q-name match">✓ ${ev.matched_name}</div>
        <div class="q-meta">${ev.cam_label}</div>
        <div class="q-score">Score: ${ev.score.toFixed(3)}</div>
        <div class="q-meta">${timeStr(ev.timestamp)}</div>
      </div>`;
  } else {
    card.innerHTML = `
      <img class="q-crop" src="${ev.crop_url}?t=1" />
      <div class="q-body">
        <div class="q-name unknown">Unknown</div>
        <div class="q-meta">${ev.cam_label}</div>
        <div class="q-meta">${timeStr(ev.timestamp)}</div>
        <div class="q-enroll-area">
          <button class="q-enroll-btn">+ Enroll this face</button>
          <div class="q-enroll-form" style="display:none">
            <input type="text" placeholder="Name…" maxlength="40" />
            <button>✓</button>
          </div>
        </div>
      </div>`;

    const enrollBtn  = card.querySelector('.q-enroll-btn');
    const enrollForm = card.querySelector('.q-enroll-form');
    const nameInput  = card.querySelector('.q-enroll-form input');
    const submitBtn  = card.querySelector('.q-enroll-form button');

    enrollBtn.addEventListener('click', () => {
      enrollBtn.style.display = 'none';
      enrollForm.style.display = 'flex';
      nameInput.focus();
    });

    async function doEnroll() {
      const name = nameInput.value.trim();
      if (!name) return;
      submitBtn.textContent = '…';
      const res  = await fetch(`/enroll/queue/${ev.id}`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name}),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Failed'); submitBtn.textContent = '✓'; return; }
      // update card to show recognition
      card.classList.add('recognition'); card.classList.remove('detection');
      card.style.width = '200px';
      card.innerHTML = `
        <div class="q-rec-row" style="padding:8px 8px 0;">
          <img class="q-crop" src="${ev.crop_url}?t=1" style="width:80px;height:70px;border-radius:6px;object-fit:cover;flex-shrink:0;" />
          <img class="q-enrolled-photo" src="/faces/${encodeURIComponent(name)}/photo?t=${Date.now()}" />
        </div>
        <div class="q-body">
          <div class="q-name match">✓ ${name}</div>
          <div class="q-meta">${ev.cam_label}</div>
          <div class="q-meta">${timeStr(ev.timestamp)}</div>
        </div>`;
      loadFaces();
    }

    submitBtn.addEventListener('click', doEnroll);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doEnroll(); });
  }
  return card;
}

const knownQueueIds = new Set();

async function pollQueue() {
  try {
    const res    = await fetch('/queue');
    const events = await res.json();
    const scroll = document.getElementById('queue-scroll');
    const count  = document.getElementById('queue-count');

    if (!events.length) {
      scroll.innerHTML = '<div class="q-empty">No events yet.</div>';
      count.textContent = '';
      return;
    }

    count.textContent = `(${events.length}/20)`;

    // prepend new events; don't rebuild entire list
    let hasNew = false;
    events.forEach(ev => {
      if (knownQueueIds.has(ev.id)) return;
      knownQueueIds.add(ev.id);
      hasNew = true;
      const card = renderQueueCard(ev);
      if (scroll.firstChild?.classList?.contains('q-empty')) scroll.innerHTML = '';
      scroll.prepend(card);
    });

    // prune cards beyond 20
    while (scroll.children.length > 20) scroll.removeChild(scroll.lastChild);
  } catch { /* server not ready */ }
}

// ── enroll tabs ────────────────────────────────────────────────────────────────
let enrollMode = 'cam';

document.querySelectorAll('.etab').forEach(tab => {
  tab.addEventListener('click', () => {
    enrollMode = tab.dataset.tab;
    document.querySelectorAll('.etab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('mode-cam').style.display   = enrollMode === 'cam'   ? '' : 'none';
    document.getElementById('mode-image').style.display = enrollMode === 'image' ? 'flex' : 'none';
  });
});

// image preview
document.getElementById('enroll-image').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('img-preview').src = e.target.result;
    document.getElementById('img-preview-name').textContent = file.name;
    document.getElementById('img-preview-wrap').style.display = '';
  };
  reader.readAsDataURL(file);
  document.getElementById('img-upload-lbl').childNodes[0].textContent = '✅ Image selected  ';
});

// ── enroll form ────────────────────────────────────────────────────────────────
document.getElementById('enroll-sound').addEventListener('change', function() {
  document.getElementById('sound-name').textContent = this.files[0]?.name ?? '';
});

document.getElementById('enroll-btn').addEventListener('click', async () => {
  const btn       = document.getElementById('enroll-btn');
  const name      = document.getElementById('enroll-name').value.trim();
  const soundFile = document.getElementById('enroll-sound').files[0];
  if (!name) { document.getElementById('enroll-name').focus(); return; }

  if (enrollMode === 'image') {
    // ── image upload enrollment (instant) ──
    const imgFile = document.getElementById('enroll-image').files[0];
    if (!imgFile) { alert('Please choose an image first.'); return; }

    const fd = new FormData();
    fd.append('name', name);
    fd.append('image', imgFile);
    if (soundFile) fd.append('sound', soundFile);

    btn.disabled = true; btn.textContent = 'Processing…';
    const res = await fetch('/enroll/image', { method: 'POST', body: fd });
    const data = await res.json();

    btn.disabled = false; btn.textContent = 'Enroll Face';

    if (!res.ok) { alert(data.error || 'Enrollment failed'); return; }

    // reset
    document.getElementById('enroll-name').value  = '';
    document.getElementById('enroll-image').value = '';
    document.getElementById('enroll-sound').value = '';
    document.getElementById('sound-name').textContent = '';
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.getElementById('img-upload-lbl').childNodes[0].textContent = '📂 Choose image…  ';
    loadFaces();

  } else {
    // ── camera enrollment (async, progress-tracked) ──
    const camId = document.getElementById('enroll-cam').value;
    const fd = new FormData();
    fd.append('name', name);
    fd.append('cam_id', camId);
    if (soundFile) fd.append('sound', soundFile);

    btn.disabled = true; btn.textContent = 'Starting…';
    const res = await fetch('/enroll', { method: 'POST', body: fd });
    if (!res.ok) {
      const e = await res.json();
      alert(e.error || 'Failed'); btn.disabled = false; btn.textContent = 'Enroll Face'; return;
    }

    document.getElementById('enroll-name').value = '';
    document.getElementById('enroll-sound').value = '';
    document.getElementById('sound-name').textContent = '';
    btn.textContent = 'Enrolling…';

    const check = setInterval(async () => {
      const s = await (await fetch('/status')).json();
      if (!s.enroll?.active) {
        clearInterval(check);
        btn.disabled = false; btn.textContent = 'Enroll Face';
        loadFaces();
      }
    }, 500);
  }
});

// ── init ───────────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('/cameras');
  cameras = await res.json();
  buildCameraCards(cameras);
  loadFaces();
  loadSoundSettings();
  pollQueue();
  setInterval(pollStatus, 250);
  setInterval(pollQueue, 2000);
  setInterval(loadFaces, 6000);
  pollStatus();
}

init();
</script>
